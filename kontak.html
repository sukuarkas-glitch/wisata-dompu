<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Wisata Dompu</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="kontak-page">

    <div class="kontak-container">

        <img src="images/logo-dompu.jpg" alt="Logo Dompu" class="kontak-logo">

        <h1>Hubungi Kami</h1>

        <p>
            Jika Anda memiliki pertanyaan, saran, atau ingin mengetahui informasi
            lebih lanjut mengenai wisata di Kabupaten Dompu, silakan hubungi kami.
        </p>

        <div class="info-kontak">

            <h3>📍 Alamat</h3>
            <p>Kabupaten Dompu, Nusa Tenggara Barat</p>

            <h3>📧 Email</h3>
            <p>sukuarkas@gmail.com</p>

            <h3>📱 WhatsApp</h3>
            <p>081332856101</p>

        </div>

       <form id="kontakForm" class="kontak-form">

    <input type="text"
           id="nama"
           placeholder="Nama Lengkap"
           required>

    <input type="email"
           id="email"
           placeholder="Email"
           required>

    <textarea id="pesan"
              placeholder="Tulis pesan Anda..."
              required></textarea>

    <button type="submit">
        Kirim Pesan
    </button>

</form>

        <br>

        <a href="index.html" class="btn">🏠 Kembali ke Beranda</a>
       
        <script src="js/script.js"></script>
    </div>

</body>
</html>
